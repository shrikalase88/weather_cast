name: weather_cast
description: "Weather Cast - A modern skeuomorphic weather app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  http: ^1.6.0
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  cupertino_icons: ^1.0.9
  flutter_animate: ^4.5.2
  timezone: ^0.11.0
  lat_lng_to_timezone: ^0.2.0
  flutter_dotenv: ^6.0.1
  home_widget:
    path: plugins/home_widget

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#0A1929"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
